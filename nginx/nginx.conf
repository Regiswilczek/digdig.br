events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=magic_limit:10m rate=3r/m;
    limit_req_status 429;

    # ── Redireciona HTTP → HTTPS (todos os domínios) ──────────────────────────
    server {
        listen 80;
        server_name digdig.com.br www.digdig.com.br pnl.digdig.com.br office.digdig.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── office.digdig.com.br → Paperclip (HTTPS) ─────────────────────────────
    server {
        listen 443 ssl;
        server_name office.digdig.com.br;

        ssl_certificate     /etc/letsencrypt/live/digdig.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/digdig.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://172.18.0.1:3100;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
        }
    }

    # ── pnl.digdig.com.br → Painel Administrativo ────────────────────────────
    server {
        listen 443 ssl;
        server_name pnl.digdig.com.br;

        ssl_certificate     /etc/letsencrypt/live/digdig.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/digdig.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        resolver 127.0.0.11 valid=30s;
        set $api http://api:8000;

        root /usr/share/nginx/html;
        index index.html;

        # Redireciona raiz para o painel admin
        location = / {
            return 302 /pnl;
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            expires 0;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Login endpoint — rate limit apertado para prevenir flooding
        location = /pnl/admin/magic-link {
            limit_req zone=magic_limit burst=3 nodelay;
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # API admin (endpoints /pnl/admin/* e /pnl/orgaos/* e /pnl/rodadas/*)
        location /pnl/admin/ {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /pnl/orgaos/ {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /pnl/rodadas/ {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /public/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── digdig.com.br + www (Site principal HTTPS) ───────────────────────────
    server {
        listen 443 ssl;
        server_name digdig.com.br www.digdig.com.br;

        ssl_certificate     /etc/letsencrypt/live/digdig.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/digdig.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        resolver 127.0.0.11 valid=30s;
        set $api http://api:8000;

        root /usr/share/nginx/html;
        index index.html;

        # index.html nunca cacheado — browser busca sempre após deploy
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            expires 0;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Bundles com hash no nome são imutáveis — cache de 1 ano é seguro
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /painel/orgaos/ {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /public/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /billing/ {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /webhooks/ {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /admin/ {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Painel do usuário — perfil, assinatura, favoritos, avatar.
        # GET/PATCH /me (exact) + /me/avatar, /me/assinatura, /me/favoritos, etc.
        location = /me {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /me/ {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            # Avatar upload é multipart com até 2MB
            client_max_body_size 5M;
        }

        location /chat/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }

        location /health {
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
        }
    }
}
